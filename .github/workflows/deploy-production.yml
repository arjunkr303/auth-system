name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy-prod:
    name: Deploy to Production
    environment: production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy Frontend -> Vercel Production
        run: npx vercel --prod --token=$VERCEL_TOKEN
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Backend -> Render Production
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys" \
            -d '{}'

      - name: Smoke test — verify production is up
        run: |
          sleep 30
          curl --fail https://auth-system-for-production.onrender.com/health || exit 1
