name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-frontend-staging:
    name: Deploy Frontend -> Vercel Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy to Vercel (preview)
        run: npx vercel --token=$VERCEL_TOKEN
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-backend-staging:
    name: Deploy Backend -> Render Staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render staging deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -d '{}'
