name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      - name: Run Linting
        working-directory: frontend
        run: npm run lint

      - name: Check Formatting
        working-directory: frontend
        run: npm run format:check

  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Tests
        working-directory: backend
        run: PYTHONPATH=. pytest

  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  automerge:
    name: Auto PR & Merge
    needs: [frontend, backend, e2e]
    if: github.event_name == 'push' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Auto Create & Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          PR_URL=$(gh pr list --head ${{ github.ref_name }} --base main --json url --jq '.[0].url')
          
          if [ -z "$PR_URL" ]; then
            echo "No PR found. Creating a new PR..."
            PR_URL=$(gh pr create \
              --title "feat: automated merge of ${{ github.ref_name }}" \
              --body "This PR was automatically created and merged by CI after passing all tests." \
              --base main \
              --head ${{ github.ref_name }})
            echo "Created PR: $PR_URL"
          else
            echo "PR already exists: $PR_URL"
          fi
          
          echo "Merging PR..."
          gh pr merge ${{ github.ref_name }} --merge --auto
