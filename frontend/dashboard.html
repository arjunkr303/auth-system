<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Synx AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04060f;
    --surface: #090d1a;
    --surface2: #0e1425;
    --border: rgba(99,179,237,0.12);
    --accent: #38bdf8;
    --accent2: #6ee7b7;
    --text: #e2eaf7;
    --muted: #5a6a88;
    --error: #f87171;
    --success: #4ade80;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: #38bdf8; top: -150px; left: -150px; }
  .orb2 { width: 400px; height: 400px; background: #6ee7b7; bottom: -120px; right: -100px; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }

  /* ── Navbar ── */
  .navbar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(9,13,26,0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-logo svg { width: 24px; height: 24px; }
  .nav-logo-text {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text);
  }
  .nav-logo-text span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-user {
    font-size: 13px;
    color: var(--muted);
  }
  .nav-user strong { color: var(--text); }
  .btn-logout {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: var(--error);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.5); }
  .btn-logout svg { width: 14px; height: 14px; }

  /* ── Main Content ── */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* Welcome banner */
  .welcome-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.2rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .welcome-left {}
  .welcome-greeting {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .welcome-name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .welcome-name span { color: var(--accent); }
  .welcome-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }
  .welcome-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(110,231,183,0.12));
    border: 1px solid rgba(56,189,248,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.6rem;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: rgba(56,189,248,0.25); }
  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
  }
  .stat-icon svg { width: 18px; height: 18px; }
  .stat-icon.blue { background: rgba(56,189,248,0.12); }
  .stat-icon.green { background: rgba(110,231,183,0.12); }
  .stat-icon.amber { background: rgba(251,191,36,0.12); }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--accent2); }

  /* Info card */
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.6rem 1.8rem;
  }
  .info-card-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--muted); }
  .info-val { color: var(--text); font-weight: 500; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge.verified {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.25);
    color: var(--success);
  }
  .badge.dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-logo">
    <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L3 7.5V18.5L13 24L23 18.5V7.5L13 2Z" stroke="#38bdf8" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M13 8L8 10.8V16.2L13 19L18 16.2V10.8L13 8Z" fill="rgba(56,189,248,0.25)" stroke="#6ee7b7" stroke-width="1"/>
      <circle cx="13" cy="13" r="2" fill="#38bdf8"/>
    </svg>
    <span class="nav-logo-text">Synx <span>AI</span></span>
  </div>
  <div class="nav-right">
    <span class="nav-user">Signed in as <strong id="nav-name">...</strong></span>
    <button class="btn-logout" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</nav>

<!-- Main -->
<div class="main">

  <!-- Welcome Banner -->
  <div class="welcome-banner">
    <div class="welcome-left">
      <div class="welcome-greeting">Welcome back,</div>
      <div class="welcome-name">Hello, <span id="dash-name">...</span> 👋</div>
      <div class="welcome-sub">You are successfully logged in to Synx AI & Automation.</div>
    </div>
    <div class="welcome-avatar" id="dash-avatar">--</div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="stat-label">Account Status</div>
      <div class="stat-value accent">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 9.81 19.79 19.79 0 0 1 1 1.18 2 2 0 0 1 2.96 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 14.9v3z"/>
        </svg>
      </div>
      <div class="stat-label">Phone Verified</div>
      <div class="stat-value green">Yes ✓</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon amber">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="stat-label">Session</div>
      <div class="stat-value" style="color:#fbbf24">Secure</div>
    </div>
  </div>

  <!-- Account Info -->
  <div class="info-card">
    <div class="info-card-title">Account Details</div>
    <div class="info-row">
      <span class="info-key">Full Name</span>
      <span class="info-val" id="info-name">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Phone Number</span>
      <span class="info-val" id="info-phone">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Verification</span>
      <span class="badge verified"><span class="badge dot"></span> Verified</span>
    </div>
    <div class="info-row">
      <span class="info-key">Member Since</span>
      <span class="info-val" id="info-date">—</span>
    </div>
  </div>

</div>

<script>
  const BASE = "http://localhost:8000";

  // On page load — check token and load user
  window.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || 'null');

    // If no token, redirect back to login
    if (!token) {
      window.location.href = 'index.html';
      return;
    }

    // Verify token is still valid by calling /me
    try {
      const r = await fetch(BASE + '/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!r.ok) {
        localStorage.clear();
        window.location.href = 'index.html';
        return;
      }

      const data = await r.json();
      populateDashboard(data);

    } catch(e) {
      // Server not reachable — use cached user data
      if (user) populateDashboard(user);
    }
  });

  function populateDashboard(user) {
    const name = user.customer_name || user.name || '—';
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const joinDate = user.created_at
      ? new Date(user.created_at).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' })
      : '—';

    document.getElementById('nav-name').textContent     = name;
    document.getElementById('dash-name').textContent    = name.split(' ')[0];
    document.getElementById('dash-avatar').textContent  = initials;
    document.getElementById('info-name').textContent    = name;
    document.getElementById('info-phone').textContent   = user.phone_number || '—';
    document.getElementById('info-date').textContent    = joinDate;
  }

  async function logout() {
    const token = localStorage.getItem('token');
    try {
      await fetch(BASE + '/logout', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch(e) {}
    localStorage.clear();
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
